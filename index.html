<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 5개 추출기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()">🌙 다크</button>
    <h1>🎱 로또 번호 5개 추출기</h1>
    <p>버튼을 눌러 1부터 45까지 중복 없이 5개의 번호를 생성합니다.</p>
    <button onclick="generateLotto()">번호 생성하기</button>
    <div id="lotto-results" class="ball-container"></div>
</div>

<div class="container form-container">
    <h2>📩 제휴문의</h2>
    <p>제휴·광고 문의를 남겨주시면 확인 후 회신드립니다.</p>
    <form id="contact-form" action="https://formspree.io/f/mwvdykdd" method="POST">
        <div class="field">
            <label for="name">이름</label>
            <input type="text" id="name" name="name" placeholder="홍길동" required>
        </div>
        <div class="field">
            <label for="email">이메일</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="field">
            <label for="message">문의 내용</label>
            <textarea id="message" name="message" rows="4" placeholder="문의하실 내용을 입력해주세요." required></textarea>
        </div>
        <button type="submit">문의 보내기</button>
        <p id="form-status" class="form-status"></p>
    </form>
</div>

<div class="container comments-container">
    <h2>💬 댓글</h2>
    <div id="disqus_thread"></div>
    <noscript>댓글을 보려면 JavaScript를 활성화해주세요. <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
</div>

<script>
    // Disqus 댓글 연동
    (function() {
        var d = document, s = d.createElement('script');
        s.src = 'https://product-builder-lecture-10.disqus.com/embed.js';
        s.setAttribute('data-timestamp', +new Date());
        (d.head || d.body).appendChild(s);
    })();
</script>

<script src="script.js"></script>

</body>
</html>
